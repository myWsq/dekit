<section class="form-page">
  <div class="form-container">
    <h1 class="form-title">Contact Us</h1>
    <p class="form-description">Fill out the form below and we'll get back to you shortly.</p>
    <form class="form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="jane@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
      </div>
      <button class="form-submit" type="submit">Send Message</button>
    </form>
  </div>
</section>
